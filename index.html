<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#29583f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="The Nest" />
  <title>The Nest</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="assets/icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main id="login-view" class="view view-centered" hidden>
    <section class="card login-card">
      <h1 class="brand">The Nest</h1>
      <p class="tagline">One ledger, two people.</p>
      <form id="login-form" novalidate>
        <label for="login-email">Email</label>
        <input id="login-email" name="email" type="email" autocomplete="email" required />
        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password" autocomplete="current-password" required />
        <p id="login-error" class="form-error" role="alert" hidden></p>
        <button type="submit" id="login-submit" class="btn btn-primary">Sign in</button>
      </form>
    </section>
  </main>

  <main id="app-view" class="view" hidden>
    <header class="app-header">
      <h1 class="brand brand-small">The Nest</h1>
      <div class="whoami">
        <button id="idea-jump" class="btn btn-ghost btn-small idea-jump"
                aria-label="Log an idea or friction note">💡</button>
        <span id="user-name" class="user-pill"></span>
        <button id="sign-out" class="btn btn-ghost">Sign out</button>
      </div>
    </header>
    <section class="card dash-card">
      <div class="dash-head">
        <div>
          <p id="dash-label" class="dash-label">This month</p>
          <p id="dash-total" class="dash-total">S$0.00</p>
        </div>
        <p id="dash-compare" class="dash-compare"></p>
      </div>
      <p id="dash-months" class="dash-months" hidden></p>
      <p id="dash-empty" class="muted" hidden>Nothing logged this month yet.</p>
      <ul id="dash-cats" class="dash-cats"></ul>
    </section>

    <section class="card form-card">
      <h2 id="form-title" class="card-title">Log an expense</h2>
      <form id="expense-form">
        <label for="exp-amount">Amount (SGD)</label>
        <input id="exp-amount" name="amount" type="number" inputmode="decimal"
               step="0.01" min="0.01" max="99999999" placeholder="0.00" required />

        <label for="exp-category">Category</label>
        <select id="exp-category" name="category_id" required></select>

        <fieldset class="paid-by">
          <legend>Paid by</legend>
          <div class="segment">
            <label><input type="radio" name="paid_by" value="Shawn" required /><span>Shawn</span></label>
            <label><input type="radio" name="paid_by" value="Claire" /><span>Claire</span></label>
          </div>
        </fieldset>

        <label for="exp-date">Date</label>
        <input id="exp-date" name="date" type="date" required />

        <label for="exp-note">Note <span class="optional">(optional)</span></label>
        <input id="exp-note" name="note" type="text" maxlength="200" autocomplete="off" />

        <p id="form-status" class="form-error" role="alert" hidden></p>
        <button type="submit" id="exp-submit" class="btn btn-primary">Save</button>
        <button type="button" id="exp-cancel" class="btn btn-ghost btn-block" hidden>Cancel edit</button>
      </form>
    </section>

    <section class="card ledger-card">
      <div class="card-head">
        <h2 class="card-title">Ledger</h2>
        <button id="export-csv" class="btn btn-ghost btn-small">Export CSV</button>
      </div>
      <p id="ledger-status" class="muted">Loading…</p>
      <ul id="ledger" class="ledger"></ul>
    </section>

    <section class="card idea-card">
      <h2 class="card-title">Ideas &amp; friction</h2>
      <p class="muted idea-hint">Something slow, missing, or annoying? Log the itch, not the fix.</p>
      <form id="idea-form">
        <input id="idea-body" name="body" type="text" maxlength="500" required
               placeholder="What was the question or annoyance?"
               aria-label="Idea or friction note" autocomplete="off" />
        <p id="idea-status" class="form-error" role="alert" hidden></p>
        <button type="submit" id="idea-submit" class="btn btn-primary idea-submit">Log it</button>
      </form>
      <ul id="idea-list" class="ledger idea-list"></ul>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
